<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wonders of the World</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Wonders of the World</h1>
      <p>
        A journey through humanity's most breathtaking achievements — ancient
        monuments and natural marvels that have inspired awe for centuries.
        Explore these iconic landmarks and the stories behind them.
      </p>
    </header>

    <main>
      <div class="grid-container">

        <figure>
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Machu_Picchu%2C_Peru.jpg/640px-Machu_Picchu%2C_Peru.jpg"
            alt="Aerial view of Machu Picchu, the ancient Inca citadel nestled in the Andes mountains of Peru"
          />
          <figcaption>
            <h2>Machu Picchu</h2>
            <p>
              Built in the 15th century high in the Peruvian Andes, Machu Picchu
              is a masterpiece of Inca engineering. Its stone terraces and
              temples blend so seamlessly with the surrounding mountains that it
              remained unknown to the outside world until 1911.
            </p>
          </figcaption>
        </figure>

        <figure>
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/All_Gizah_Pyramids.jpg/640px-All_Gizah_Pyramids.jpg"
            alt="The three pyramids of Giza standing on the Egyptian desert plateau under a blue sky"
          />
          <figcaption>
            <h2>Pyramids of Giza</h2>
            <p>
              Standing for over 4,500 years, the Great Pyramids of Giza are the
              only surviving wonder of the ancient world. Built as royal tombs,
              these colossal structures were constructed with remarkable
              precision using millions of limestone and granite blocks.
            </p>
          </figcaption>
        </figure>

        <figure>
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/20090826_great-wall-of-china-mutianyu-9_4000x3000.jpg/640px-20090826_great-wall-of-china-mutianyu-9_4000x3000.jpg"
            alt="The Great Wall of China winding through green forested mountains at the Mutianyu section"
          />
          <figcaption>
            <h2>Great Wall of China</h2>
            <p>
              Stretching over 13,000 miles across northern China, the Great Wall
              was built over many centuries to protect Chinese states from
              invasions. Today it remains one of the most impressive
              architectural feats in human history and a symbol of Chinese
              civilization.
            </p>
          </figcaption>
        </figure>

        <figure>
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Taj_Mahal_visited_by_many_tourists.jpg/640px-Taj_Mahal_visited_by_many_tourists.jpg"
            alt="The Taj Mahal white marble mausoleum reflecting in a long pool, surrounded by tourists"
          />
          <figcaption>
            <h2>Taj Mahal</h2>
            <p>
              Commissioned in 1632 by Mughal Emperor Shah Jahan as a mausoleum
              for his beloved wife, the Taj Mahal is an enduring symbol of love.
              Its white marble facade, intricate inlay work, and perfect
              symmetry make it one of the world's most recognized buildings.
            </p>
          </figcaption>
        </figure>

        <figure>
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Colosseo_2020.jpg/640px-Colosseo_2020.jpg"
            alt="The exterior of the ancient Roman Colosseum in Rome, Italy, showing its iconic arched facade"
          />
          <figcaption>
            <h2>The Colosseum</h2>
            <p>
              Completed in 80 AD, the Roman Colosseum could hold up to 80,000
              spectators who gathered to watch gladiatorial contests and public
              spectacles. This feat of Roman engineering used concrete and stone
              in innovative ways that still influence architecture today.
            </p>
          </figcaption>
        </figure>

        <figure>
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Chichen_Itza_3.jpg/640px-Chichen_Itza_3.jpg"
            alt="El Castillo pyramid at Chichen Itza, Mexico, rising above the surrounding jungle under a dramatic sky"
          />
          <figcaption>
            <h2>Chichén Itzá</h2>
            <p>
              The ancient Maya city of Chichén Itzá flourished between the 9th
              and 12th centuries. Its iconic stepped pyramid El Castillo was
              designed so that on the spring and autumn equinoxes, sunlight
              creates a shadow resembling a serpent descending the stairs.
            </p>
          </figcaption>
        </figure>

        <figure>
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Christ_the_Redeemer_-_Christ_Redeemer.jpg/480px-Christ_the_Redeemer_-_Christ_Redeemer.jpg"
            alt="The Christ the Redeemer statue standing atop Corcovado mountain above Rio de Janeiro, Brazil"
          />
          <figcaption>
            <h2>Christ the Redeemer</h2>
            <p>
              Standing 98 feet tall atop Corcovado mountain in Rio de Janeiro,
              this Art Deco statue of Jesus Christ was completed in 1931. Its
              outstretched arms span 92 feet and are visible from nearly
              everywhere in the city, making it an iconic symbol of Brazil.
            </p>
          </figcaption>
        </figure>

        <figure>
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/Petra_Jordan_BW_21.JPG/640px-Petra_Jordan_BW_21.JPG"
            alt="The Treasury facade carved into rose-red sandstone cliffs at Petra, Jordan"
          />
          <figcaption>
            <h2>Petra</h2>
            <p>
              Known as the "Rose City" for its pink sandstone cliffs, Petra was
              carved directly into rock by the Nabataean civilization over 2,000
              years ago. Its most famous structure, Al-Khazneh (The Treasury),
              stands 128 feet tall and served as a royal tomb.
            </p>
          </figcaption>
        </figure>

        <figure>
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Iguasu_falls_rainbow.jpg/640px-Iguasu_falls_rainbow.jpg"
            alt="Iguazu Falls with a rainbow arching over the cascading waterfalls surrounded by lush green jungle"
          />
          <figcaption>
            <h2>Iguazu Falls</h2>
            <p>
              Straddling the border of Argentina and Brazil, Iguazu Falls
              comprises 275 individual cascades stretching nearly 2 miles wide.
              Wider than Niagara and taller than Victoria Falls, it creates a
              permanent mist that sustains a unique rainforest ecosystem teeming
              with wildlife.
            </p>
          </figcaption>
        </figure>

      </div>
    </main>
